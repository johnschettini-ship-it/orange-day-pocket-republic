<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="theme-color" content="#1a0f2e">
  <title>Orange Day: Pocket Republic</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <!-- Chrome is minimal on purpose: the canvas is the product, not the page blurb. -->
    <div class="stage">
      <canvas id="game" width="960" height="540" aria-label="Orange Day: Pocket Republic"></canvas>
      <div id="touch" class="touch" aria-hidden="true">
        <div class="pad move" data-pad="move"><span class="tag">MOVE</span><div class="knob"></div></div>
        <button type="button" class="act" data-act="interact">E</button>
        <button type="button" class="act power" data-act="power">PWR</button>
        <button type="button" class="act obj" data-act="obj">OBJ</button>
        <button type="button" class="act menu" data-act="menu">&#9776;</button>
      </div>
    </div>
  </main>
  <script src="data.js"></script>
  <script src="game.js"></script>
</body>
</html>
